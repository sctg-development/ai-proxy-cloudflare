name: Create shared encrypted .env artifact

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  create-env:
    runs-on: ubuntu-latest
    steps:  
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 1

      - name: Create .env file (shared secrets from deploy-worker.yaml)
        run: |
          echo "CRYPTOKEN=${{ secrets.CRYPTOKEN }}" > .env
          echo "AI_JSON_CRYPTOKEN=${{ secrets.AI_JSON_CRYPTOKEN }}" >> .env
          echo "CLOUDFLARE_AIG_TOKEN=${{ secrets.CLOUDFLARE_AIG_TOKEN }}" >> .env
          echo "CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" >> .env
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> .env

      - name: Generate wrangler.jsonc from .env
        run: |
          python3 scripts/generate-wrangler-jsonc.py .env wrangler.jsonc wrangler.jsonc

      - name: Create encrypted artifact with .env, wrangler.jsonc and secrets.json
        run: |
          tar -czf env_and_wrangler.tar.gz \
            .env \
            wrangler.jsonc secrets.json
          openssl enc -aes-256-cbc -salt -in env_and_wrangler.tar.gz -out .env.enc -iter 10000 -pass pass:"${{ secrets.CRYPTOKEN }}"
          rm .env env_and_wrangler.tar.gz

      - name: Upload shared encrypted artifact
        uses: actions/upload-artifact@v6
        with:
          name: shared-env
          include-hidden-files: true
          path: .env.enc

